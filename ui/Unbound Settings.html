<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unbound</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c10;
  --surface: #13131a;
  --surface2:#1c1c26;
  --border:  #252530;
  --text:    #eeeef5;
  --muted:   #6b6b80;
  --font:    'Outfit', sans-serif;

  --blue:   oklch(62% 0.22 235);
  --teal:   oklch(68% 0.20 175);
  --purple: oklch(65% 0.22 290);
  --amber:  oklch(72% 0.20 55);
  --green:  oklch(68% 0.20 145);
  --red:    oklch(62% 0.22 15);
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

#root { display: flex; flex-direction: column; min-height: 100vh; }

.app-shell {
  display: flex;
  flex: 1;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(12,12,16,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px 0 20px;
  gap: 16px;
  z-index: 100;
}

.topbar-logo {
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-right: 8px;
}

.topbar-spacer { flex: 1; }

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.3s;
  border: 1px solid;
}

.status-pill.tracking   { color: var(--green);  border-color: color-mix(in oklch, var(--green)  40%, transparent); background: color-mix(in oklch, var(--green)  12%, transparent); }
.status-pill.paused     { color: var(--amber);  border-color: color-mix(in oklch, var(--amber)  40%, transparent); background: color-mix(in oklch, var(--amber)  12%, transparent); }
.status-pill.calibrating{ color: var(--blue);   border-color: color-mix(in oklch, var(--blue)   40%, transparent); background: color-mix(in oklch, var(--blue)   12%, transparent); }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.status-dot.pulse { animation: pulse 1.4s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

.topbar-btn {
  height: 34px;
  padding: 0 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.topbar-btn:hover { background: var(--border); }
.topbar-btn.danger { color: var(--red); border-color: color-mix(in oklch, var(--red) 40%, transparent); }
.topbar-btn.danger:hover { background: color-mix(in oklch, var(--red) 15%, transparent); }

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 56px; left: 0; bottom: 0;
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  z-index: 50;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }

.nav-item.active {
  color: var(--text);
  background: color-mix(in oklch, var(--section-color) 14%, transparent);
  border-color: color-mix(in oklch, var(--section-color) 30%, transparent);
}

.nav-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--section-color);
  flex-shrink: 0;
}

.nav-label { line-height: 1; }

.sidebar-divider { height: 1px; background: var(--border); margin: 8px 4px; }

/* MAIN */
.main-content {
  margin-left: 220px;
  margin-top: 56px;
  flex: 1;
  overflow-y: auto;
  padding: 32px 32px 80px;
  height: calc(100vh - 56px);
}

/* SECTIONS */
.section {
  margin-bottom: 32px;
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in oklch, var(--section-color) 7%, var(--surface));
}

.section-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: color-mix(in oklch, var(--section-color) 20%, transparent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.section-icon svg { color: var(--section-color); }

.section-title {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
}

.section-subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

.section-body {
  padding: 24px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* SLIDERS */
.slider-field { display: flex; flex-direction: column; gap: 10px; }

.slider-header { display: flex; justify-content: space-between; align-items: baseline; }

.slider-label { font-size: 0.88rem; font-weight: 600; color: var(--text); }
.slider-hint  { font-size: 0.75rem; color: var(--muted); margin-top: -6px; }

.slider-value {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--section-color);
  min-width: 44px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.slider-track { position: relative; height: 32px; display: flex; align-items: center; }

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  background: linear-gradient(to right,
    var(--section-color) 0%,
    var(--section-color) var(--pct),
    var(--border) var(--pct),
    var(--border) 100%
  );
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--section-color);
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 2px var(--section-color);
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
}

input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.15); }
input[type="range"]:focus::-webkit-slider-thumb { box-shadow: 0 0 0 4px color-mix(in oklch, var(--section-color) 35%, transparent); }

/* MODE TOGGLE */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  gap: 16px;
}

.toggle-info { flex: 1; }
.toggle-title { font-size: 0.88rem; font-weight: 600; }
.toggle-desc  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

.segmented {
  display: flex;
  background: var(--bg);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
  border: 1px solid var(--border);
}

.seg-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.seg-btn.active {
  background: var(--section-color);
  color: #fff;
  box-shadow: 0 2px 8px color-mix(in oklch, var(--section-color) 40%, transparent);
}

/* CHECKBOX */
.check-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}

.check-row:hover { border-color: var(--section-color); }

.custom-check {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.custom-check.checked { background: var(--section-color); border-color: var(--section-color); }

.check-label-wrap { flex: 1; }
.check-label { font-size: 0.88rem; font-weight: 600; }
.check-desc  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

/* CALIBRATION */
.calib-btn {
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid color-mix(in oklch, var(--section-color) 35%, transparent);
  background: color-mix(in oklch, var(--section-color) 10%, transparent);
  color: var(--section-color);
  font-family: var(--font);
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.calib-btn:hover { background: color-mix(in oklch, var(--section-color) 18%, transparent); }
.calib-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.calib-btn.running { animation: calib-pulse 1s ease-in-out infinite; }

@keyframes calib-pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--section-color) 40%, transparent); }
  50%       { box-shadow: 0 0 0 6px color-mix(in oklch, var(--section-color) 0%, transparent); }
}

.calib-primary {
  padding: 16px 20px;
  border-radius: 12px;
  border: 1px solid color-mix(in oklch, var(--section-color) 50%, transparent);
  background: color-mix(in oklch, var(--section-color) 15%, transparent);
  color: var(--section-color);
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.calib-primary:hover { background: color-mix(in oklch, var(--section-color) 25%, transparent); }
.calib-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.calib-primary.running { animation: calib-pulse 1s ease-in-out infinite; }

.calib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.calib-status {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid color-mix(in oklch, var(--section-color) 40%, transparent);
  background: color-mix(in oklch, var(--section-color) 12%, transparent);
  color: var(--section-color);
  animation: fadein 0.2s ease;
}

@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* GESTURE BINDINGS */
.gesture-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: border-color 0.15s;
}

.gesture-row:hover { border-color: color-mix(in oklch, var(--section-color) 40%, transparent); }

.gesture-name  { font-size: 0.88rem; font-weight: 600; color: var(--text); }
.gesture-arrow { font-size: 0.7rem; color: var(--section-color); opacity: 0.7; }

.gesture-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 500;
  padding: 8px 10px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
  width: 100%;
}

.gesture-select:focus { border-color: var(--section-color); }

.thresholds-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-top: 1px solid var(--border);
  margin-top: 4px;
  user-select: none;
  transition: color 0.15s;
}

.thresholds-toggle:hover { color: var(--text); }

.threshold-grid { display: flex; flex-direction: column; gap: 16px; padding-top: 12px; }

.threshold-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 14px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
}

.threshold-name {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--section-color);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.threshold-sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* VOICE */
.speech-hero {
  padding: 20px;
  border-radius: 14px;
  border: 1px solid color-mix(in oklch, var(--section-color) 30%, transparent);
  background: color-mix(in oklch, var(--section-color) 8%, transparent);
  display: flex;
  align-items: center;
  gap: 16px;
}

.mic-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: color-mix(in oklch, var(--section-color) 20%, transparent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.3s;
}

.mic-icon.active {
  background: var(--section-color);
  animation: mic-pulse 1.2s ease-in-out infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--section-color) 50%, transparent); }
  50%       { box-shadow: 0 0 0 10px color-mix(in oklch, var(--section-color) 0%, transparent); }
}

.speech-info  { flex: 1; }
.speech-title { font-size: 0.95rem; font-weight: 700; }
.speech-desc  { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

.speech-toggle-btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.speech-toggle-btn.off {
  background: var(--section-color);
  color: #fff;
  box-shadow: 0 4px 12px color-mix(in oklch, var(--section-color) 40%, transparent);
}

.speech-toggle-btn.off:hover { filter: brightness(1.1); }

.speech-toggle-btn.on {
  background: color-mix(in oklch, var(--red) 20%, transparent);
  color: var(--red);
  border: 1px solid color-mix(in oklch, var(--red) 40%, transparent);
}

.speech-toggle-btn.on:hover { background: color-mix(in oklch, var(--red) 28%, transparent); }

.cmd-table {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 12px;
  align-items: center;
}

.cmd-word {
  font-family: 'Outfit', monospace;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--section-color);
  background: color-mix(in oklch, var(--section-color) 12%, transparent);
  border: 1px solid color-mix(in oklch, var(--section-color) 25%, transparent);
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
}

.cmd-action { font-size: 0.82rem; color: var(--muted); }

/* BLENDSHAPES */
.bs-row {
  display: grid;
  grid-template-columns: 140px 1fr 44px;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}

.bs-name {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bs-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }

.bs-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.1s ease-out, background 0.2s;
  background: var(--section-color);
}

.bs-score {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* FOOTER */
.footer-bar {
  position: fixed;
  bottom: 0;
  left: 220px; right: 0;
  height: 52px;
  background: rgba(12,12,16,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 12px;
  z-index: 50;
}

.save-status { font-size: 0.82rem; font-weight: 600; flex: 1; transition: color 0.3s; }

.footer-btn {
  height: 34px;
  padding: 0 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.footer-btn:hover { background: var(--border); }

.footer-btn.primary {
  background: var(--blue);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 8px color-mix(in oklch, var(--blue) 40%, transparent);
}

.footer-btn.primary:hover { filter: brightness(1.1); }
.footer-btn.danger { color: var(--red); border-color: color-mix(in oklch, var(--red) 35%, transparent); }
.footer-btn.danger:hover { background: color-mix(in oklch, var(--red) 15%, transparent); }

/* CAMERA */
.number-field {
  display: flex;
  align-items: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  width: fit-content;
}

.num-btn {
  width: 36px; height: 36px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.num-btn:hover { background: var(--surface2); color: var(--text); }

.num-display {
  width: 44px;
  text-align: center;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--section-color);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0 4px;
  line-height: 36px;
}

.field-label { font-size: 0.88rem; font-weight: 600; margin-bottom: 8px; display: block; }
.field-hint  { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
.two-col     { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Constants ──────────────────────────────────────────────────────────────────
const SECTION_COLORS = {
  movement:    'oklch(62% 0.22 235)',
  calibration: 'oklch(68% 0.20 175)',
  gestures:    'oklch(65% 0.22 290)',
  voice:       'oklch(72% 0.20 55)',
  live:        'oklch(68% 0.20 145)',
};

const GESTURES = {
  wink_left:     'Left Wink',
  wink_right:    'Right Wink',
  mouth_open:    'Mouth Open',
  smile:         'Smile',
  pucker:        'Pucker / Kiss',
  eyebrow_raise: 'Eyebrow Raise',
};

const ACTIONS = {
  none:           'None (disabled)',
  left_click:     'Left Click',
  right_click:    'Right Click',
  double_click:   'Double Click',
  scroll_up:      'Scroll Up (hold)',
  scroll_down:    'Scroll Down (hold)',
  drag_toggle:    'Drag Toggle',
  open_osk:       'Open On-Screen Keyboard',
  pause_tracking: 'Pause / Resume Tracking',
};

const TRACKED_BLENDSHAPES = [
  'eyeBlinkLeft','eyeBlinkRight','jawOpen',
  'mouthSmileLeft','mouthSmileRight','mouthPucker',
  'browInnerUp','browOuterUpLeft','browOuterUpRight',
  'mouthFrownLeft','mouthFrownRight',
];

const VOICE_COMMANDS = [
  ['left click',    'Left Click'],
  ['right click',   'Right Click'],
  ['double click',  'Double Click'],
  ['scroll up',     'Scroll Up'],
  ['scroll down',   'Scroll Down'],
  ['keyboard',      'Toggle OSK'],
  ['drag',          'Start Drag'],
  ['drop',          'Release Drag'],
  ['pause',         'Pause Tracking'],
  ['resume',        'Resume Tracking'],
  ['type [text]',   'Type that text'],
  ['dictation on',  'Start Dictation'],
  ['dictation off', 'Stop Dictation'],
];

const DEFAULT_SETTINGS = {
  camera_index: 0,
  movement_mode: 'joystick',
  sensitivity: 0.05,
  smoothing_alpha: 0.35,
  deadzone_radius: 0.03,
  acceleration_expo: 0.8,
  hold_duration_ms: 750,
  failsafe_enabled: true,
  gesture_bindings: {
    wink_left:'open_osk', wink_right:'right_click',
    mouth_open:'left_click', smile:'scroll_down',
    pucker:'scroll_up', eyebrow_raise:'pause_tracking',
  },
  gesture_thresholds: {
    wink_left:    {trigger:0.60, release:0.25},
    wink_right:   {trigger:0.60, release:0.25},
    mouth_open:   {trigger:0.50, release:0.30},
    smile:        {trigger:0.55, release:0.35},
    pucker:       {trigger:0.80, release:0.30},
    eyebrow_raise:{trigger:0.80, release:0.25},
  },
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function pct(val, min, max) {
  return `${((val - min) / (max - min) * 100).toFixed(1)}%`;
}

function fmt(v, decimals = 2) {
  return typeof v === 'number' ? v.toFixed(decimals) : v;
}

async function api(path, options = {}) {
  const res = await fetch(path, options);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

const IconCheck = () => (

);

// ── Section wrapper ────────────────────────────────────────────────────────────
function Section({ id, color, icon, title, subtitle, children }) {
  return (
    <div id={id} className="section" style={{'--section-color': color}}>
      <div className="section-header">
        <div className="section-icon">{icon}</div>
        <div>
          <div className="section-title">{title}</div>
          {subtitle && <div className="section-subtitle">{subtitle}</div>}
        </div>
      </div>
      <div className="section-body">{children}</div>
    </div>
  );
}

// ── Slider ─────────────────────────────────────────────────────────────────────
function Slider({ label, hint, value, min, max, step, unit = '', decimals = 2, onChange }) {
  const p = pct(value, min, max);
  return (
    <div className="slider-field">
      <div className="slider-header">
        <span className="slider-label">{label}</span>
        <span className="slider-value">{fmt(value, decimals)}{unit}</span>
      </div>
      {hint && <div className="slider-hint">{hint}</div>}
      <div className="slider-track">
        <input
          type="range" min={min} max={max} step={step}
          value={value}
          style={{'--pct': p}}
          onChange={e => onChange(parseFloat(e.target.value))}
        />
      </div>
    </div>
  );
}

// ── Movement Section ───────────────────────────────────────────────────────────
function MovementSection({ settings, onChange }) {
  const c = SECTION_COLORS.movement;
  const s = settings;
  const set = k => v => onChange({...s, [k]: v});

  return (
    <Section id="movement" color={c} icon={<IconMove/>} title="Movement" subtitle="Cursor control and sensitivity">
      <div className="toggle-row" style={{'--section-color': c}}>
        <div className="toggle-info">
          <div className="toggle-title">Movement Mode</div>
          <div className="toggle-desc">
            {s.movement_mode === 'joystick'
              ? 'Distance from neutral controls cursor speed'
              : 'Face region maps directly to screen region'}
          </div>
        </div>
        <div className="segmented">
          {['joystick', 'absolute'].map(m => (
            <button key={m}
              className={`seg-btn${s.movement_mode === m ? ' active' : ''}`}
              style={s.movement_mode === m ? {'--section-color': c} : {}}
              onClick={() => onChange({...s, movement_mode: m})}>
              {m === 'joystick' ? 'Joystick' : 'Absolute'}
            </button>
          ))}
        </div>
      </div>

      {[
        {key:'sensitivity',      label:'Sensitivity',    hint:'How fast the cursor moves with face tilt',                min:0.01, max:0.2,  step:0.005, dec:3},
        {key:'smoothing_alpha',  label:'Smoothing',      hint:'Lower = smoother but laggier',                           min:0.05, max:0.95, step:0.05,  dec:2},
        {key:'deadzone_radius',  label:'Deadzone',       hint:'Ignore movements within this radius of neutral',         min:0.005,max:0.1,  step:0.005, dec:3},
        {key:'acceleration_expo',label:'Acceleration',   hint:'1.0 = linear. Higher = slow near center, fast at edges', min:0.5,  max:3.0,  step:0.1,   dec:1},
        {key:'hold_duration_ms', label:'Hold Duration',  hint:'Hold threshold before a gesture counts as a hold',       min:200,  max:1500, step:50,    dec:0, unit:' ms'},
      ].map(({key, label, hint, min, max, step, dec, unit=''}) => (
        <div key={key} style={{'--section-color': c}}>
          <Slider label={label} hint={hint} value={s[key]} min={min} max={max}
            step={step} decimals={dec} unit={unit} onChange={set(key)} />
        </div>
      ))}

      <div style={{'--section-color': c}}>
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:8}}>
          <label className="field-label" style={{margin:0}}>Camera Index</label>
          <div className="number-field">
            <button className="num-btn" onClick={() => onChange({...s, camera_index: Math.max(0, s.camera_index - 1)})}>-</button>
            <span className="num-display" style={{'--section-color': c}}>{s.camera_index}</span>
            <button className="num-btn" onClick={() => onChange({...s, camera_index: Math.min(9, s.camera_index + 1)})}>+</button>
          </div>
        </div>
        <div className="field-hint">0 = default webcam. Increment if you have multiple cameras.</div>
      </div>

      <div style={{'--section-color': c}}>
        <div className="check-row" onClick={() => onChange({...s, failsafe_enabled: !s.failsafe_enabled})}>
          <div className={`custom-check${s.failsafe_enabled ? ' checked' : ''}`}>
            {s.failsafe_enabled && <IconCheck/>}
          </div>
          <div className="check-label-wrap">
            <div className="check-label">PyAutoGUI Failsafe</div>
            <div className="check-desc">Move cursor to top-left corner to stop the app in an emergency</div>
          </div>
        </div>
      </div>
    </Section>
  );
}

// ── Calibration Section ────────────────────────────────────────────────────────
function CalibrationSection() {
  const c = SECTION_COLORS.calibration;
  const [status, setStatus] = useState(null);
  const [running, setRunning] = useState(null);

  async function calibrate(key, label) {
    setRunning(key);
    setStatus({
      msg: key === 'neutral'
        ? 'Hold your face still and relaxed...'
        : `Perform "${label}" clearly for 2 seconds...`,
      type: 'running',
    });
    try {
      const url = key === 'neutral'
        ? '/api/calibrate/neutral'
        : `/api/calibrate/gesture/${key}`;
      await api(url, {method: 'POST'});
      setStatus({
        msg: key === 'neutral'
          ? 'Neutral calibration complete.'
          : `${label} calibrated successfully.`,
        type: 'done',
      });
    } catch (err) {
      setStatus({msg: `Failed: ${err.message}`, type: 'error'});
    }
    setRunning(null);
    setTimeout(() => setStatus(null), 4000);
  }

  return (
    <Section id="calibration" color={c} icon={<IconCalib/>} title="Calibration"
      subtitle="Adapt thresholds to your face and range of motion">

      <div style={{'--section-color': c}}>
        <button
          className={`calib-primary${running === 'neutral' ? ' running' : ''}`}
          style={{'--section-color': c}}
          disabled={running !== null}
          onClick={() => calibrate('neutral', null)}>
          {running === 'neutral' ? 'Calibrating neutral face...' : 'Calibrate Neutral Face (3 s)'}
        </button>
        <div className="field-hint" style={{marginTop:8}}>Hold your face still and relaxed while this runs.</div>
      </div>

      <div>
        <div className="field-label">Per-Gesture Calibration</div>
        <div className="field-hint" style={{marginBottom:12}}>Perform each gesture clearly for 2 seconds when prompted.</div>
        <div className="calib-grid" style={{'--section-color': c}}>
          {Object.entries(GESTURES).map(([key, label]) => (
            <button key={key}
              className={`calib-btn${running === key ? ' running' : ''}`}
              style={{'--section-color': c}}
              disabled={running !== null}
              onClick={() => calibrate(key, label)}>
              {running === key ? 'Calibrating...' : label}
            </button>
          ))}
        </div>
      </div>

      {status && (
        <div className="calib-status" style={{'--section-color':
          status.type === 'done'  ? 'oklch(68% 0.20 145)' :
          status.type === 'error' ? 'oklch(62% 0.22 15)'  : c}}>
          {status.msg}
        </div>
      )}
    </Section>
  );
}

// ── Gesture Bindings Section ───────────────────────────────────────────────────
function GesturesSection({ settings, onChange }) {
  const c = SECTION_COLORS.gestures;
  const [showThresholds, setShowThresholds] = useState(false);
  const s = settings;

  function setBinding(key, val) {
    onChange({...s, gesture_bindings: {...s.gesture_bindings, [key]: val}});
  }

  function setThreshold(key, field, val) {
    onChange({...s, gesture_thresholds: {
      ...s.gesture_thresholds,
      [key]: {...s.gesture_thresholds[key], [field]: val},
    }});
  }

  return (
    <Section id="gestures" color={c} icon={<IconGesture/>} title="Gesture Bindings"
      subtitle="Map facial gestures to mouse actions">

      {Object.entries(GESTURES).map(([key, label]) => (
        <div key={key} className="gesture-row" style={{'--section-color': c}}>
          <span className="gesture-name">{label}</span>
          <span className="gesture-arrow">&#8594;</span>
          <select
            className="gesture-select"
            value={s.gesture_bindings?.[key] || 'none'}
            onChange={e => setBinding(key, e.target.value)}>
            {Object.entries(ACTIONS).map(([v, t]) => (
              <option key={v} value={v}>{t}</option>
            ))}
          </select>
        </div>
      ))}

      <div className="thresholds-toggle" style={{'--section-color': c}}
        onClick={() => setShowThresholds(!showThresholds)}>
        <span>Threshold Fine-Tuning</span>
        <span style={{transform: showThresholds ? 'rotate(180deg)' : 'none', transition:'transform 0.2s'}}>&#9662;</span>
      </div>

      {showThresholds && (
        <div className="threshold-grid">
          {Object.entries(GESTURES).map(([key, label]) => {
            const t = s.gesture_thresholds?.[key] || {trigger:0.6, release:0.25};
            return (
              <div key={key} className="threshold-row" style={{'--section-color': c}}>
                <div className="threshold-name">{label}</div>
                <div className="threshold-sliders">
                  <div style={{'--section-color': c}}>
                    <Slider label="Trigger" value={t.trigger} min={0.05} max={0.99} step={0.01} decimals={2}
                      onChange={v => setThreshold(key, 'trigger', v)} />
                  </div>
                  <div style={{'--section-color': c}}>
                    <Slider label="Release" value={t.release} min={0.01} max={0.95} step={0.01} decimals={2}
                      onChange={v => setThreshold(key, 'release', v)} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </Section>
  );
}

// ── Voice Commands Section ─────────────────────────────────────────────────────
function VoiceSection({ active, onToggle }) {
  const c = SECTION_COLORS.voice;

  return (
    <Section id="voice" color={c} icon={<IconMic active={false}/>} title="Voice Commands"
      subtitle="Control actions by voice while face tracking moves the cursor">

      <div className="speech-hero" style={{'--section-color': c}}>
        <div className={`mic-icon${active ? ' active' : ''}`} style={{'--section-color': c}}>
          <IconMic active={active}/>
        </div>
        <div className="speech-info">
          <div className="speech-title">{active ? 'Speech Mode Active' : 'Speech Mode Off'}</div>
          <div className="speech-desc">
            {active
              ? 'Listening for voice commands. Gestures only move the cursor.'
              : 'Enable to control all actions by voice. Face tracking still moves the cursor.'}
          </div>
        </div>
        <button
          className={`speech-toggle-btn ${active ? 'on' : 'off'}`}
          style={active ? {} : {'--section-color': c}}
          onClick={onToggle}>
          {active ? 'Disable' : 'Enable'}
        </button>
      </div>

      <div>
        <div className="field-label">Voice Commands</div>
        <div className="cmd-table" style={{'--section-color': c}}>
          {VOICE_COMMANDS.map(([word, action]) => (
            <React.Fragment key={word}>
              <span className="cmd-word">{word}</span>
              <span className="cmd-action">{action}</span>
            </React.Fragment>
          ))}
        </div>
        <div className="field-hint" style={{marginTop:12}}>
          Requires internet (Google Speech API) and a microphone. In dictation mode everything you say is typed — say "dictation off" to return to commands.
        </div>
      </div>
    </Section>
  );
}

// ── Live Blendshapes Section ───────────────────────────────────────────────────
function LiveSection() {
  const c = SECTION_COLORS.live;
  const [scores, setScores] = useState(
    () => Object.fromEntries(TRACKED_BLENDSHAPES.map(n => [n, 0]))
  );

  useEffect(() => {
    const interval = setInterval(() => {
      fetch('/api/blendshapes')
        .then(r => r.json())
        .then(data => setScores(prev => ({...prev, ...data})))
        .catch(() => {});
    }, 120);
    return () => clearInterval(interval);
  }, []);

  function barColor(score) {
    if (score > 0.7) return 'oklch(72% 0.20 55)';
    return c;
  }

  return (
    <Section id="live" color={c} icon={<IconLive/>} title="Live Blendshapes"
      subtitle="Perform gestures to see real-time scores for calibration">
      <div style={{'--section-color': c}}>
        {TRACKED_BLENDSHAPES.map(name => {
          const score = scores[name] || 0;
          return (
            <div key={name} className="bs-row">
              <span className="bs-name">{name}</span>
              <div className="bs-track">
                <div className="bs-fill" style={{
                  width: `${(score * 100).toFixed(1)}%`,
                  background: barColor(score),
                  opacity: score > 0 ? 1 : 0.3,
                }}/>
              </div>
              <span className="bs-score">{score.toFixed(2)}</span>
            </div>
          );
        })}
      </div>
    </Section>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [settings, setSettings]       = useState(DEFAULT_SETTINGS);
  const [trackStatus, setTrackStatus] = useState('tracking');
  const [speechActive, setSpeechActive] = useState(false);
  const [activeSection, setActiveSection] = useState('movement');
  const [saveMsg, setSaveMsg]         = useState('');
  const mainRef   = useRef(null);
  const saveTimer = useRef(null);

  const navItems = [
    {id:'movement',    label:'Movement',    color: SECTION_COLORS.movement},
    {id:'calibration', label:'Calibration', color: SECTION_COLORS.calibration},
    {id:'gestures',    label:'Gestures',    color: SECTION_COLORS.gestures},
    {id:'voice',       label:'Voice',       color: SECTION_COLORS.voice},
    {id:'live',        label:'Live View',   color: SECTION_COLORS.live},
  ];

  // Load settings on mount
  useEffect(() => {
    fetch('/api/settings')
      .then(r => r.json())
      .then(data => setSettings({...DEFAULT_SETTINGS, ...data}))
      .catch(() => {});
  }, []);

  // Poll status every 500 ms
  useEffect(() => {
    const interval = setInterval(() => {
      fetch('/api/status')
        .then(r => r.json())
        .then(data => {
          if (data.calibration_in_progress) setTrackStatus('calibrating');
          else if (data.paused)             setTrackStatus('paused');
          else                              setTrackStatus('tracking');
          setSpeechActive(data.speech_active ?? false);
        })
        .catch(() => {});
    }, 500);
    return () => clearInterval(interval);
  }, []);

  // Scrollspy
  useEffect(() => {
    const main = mainRef.current;
    if (!main) return;
    function onScroll() {
      const scrollTop = main.scrollTop + 60;
      for (let i = navItems.length - 1; i >= 0; i--) {
        const el = document.getElementById(navItems[i].id);
        if (el && el.offsetTop <= scrollTop) {
          setActiveSection(navItems[i].id);
          break;
        }
      }
    }
    main.addEventListener('scroll', onScroll, {passive: true});
    return () => main.removeEventListener('scroll', onScroll);
  }, []);

  async function saveSettings(s) {
    setSaveMsg('Saving...');
    try {
      await api('/api/settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(s),
      });
      setSaveMsg('Settings saved');
      setTimeout(() => setSaveMsg(''), 2500);
    } catch (err) {
      setSaveMsg(`Save failed: ${err.message}`);
    }
  }

  function handleSettingsChange(next) {
    setSettings(next);
    clearTimeout(saveTimer.current);
    setSaveMsg('Unsaved changes');
    saveTimer.current = setTimeout(() => saveSettings(next), 1200);
  }

  async function togglePause() {
    const endpoint = trackStatus === 'paused' ? '/api/resume' : '/api/pause';
    await fetch(endpoint, {method: 'POST'}).catch(() => {});
  }

  async function handleSave() {
    clearTimeout(saveTimer.current);
    await saveSettings(settings);
  }

  function handleReset() {
    if (!window.confirm('Reset all settings to defaults?')) return;
    setSettings(DEFAULT_SETTINGS);
    saveSettings(DEFAULT_SETTINGS);
  }

  async function handleQuit() {
    if (!window.confirm('Quit Unbound?')) return;
    await fetch('/api/quit', {method: 'POST'}).catch(() => {});
    window.close();
  }

  async function toggleSpeech() {
    const endpoint = speechActive ? '/api/speech/stop' : '/api/speech/start';
    await fetch(endpoint, {method: 'POST'}).catch(() => {});
  }

  function scrollTo(id) {
    const el = document.getElementById(id);
    if (!el || !mainRef.current) return;
    mainRef.current.scrollTo({top: el.offsetTop - 20, behavior: 'smooth'});
    setActiveSection(id);
  }

  const statusLabel = trackStatus === 'tracking' ? 'Tracking' : trackStatus === 'paused' ? 'Paused' : 'Calibrating';

  return (
    <>
      <div className="topbar">
        <span className="topbar-logo">Unbound</span>
        <div className={`status-pill ${trackStatus}`}>
          <div className={`status-dot${trackStatus === 'tracking' ? ' pulse' : ''}`}></div>
          {statusLabel}
        </div>
        <div className="topbar-spacer"/>
        <button className="topbar-btn" onClick={togglePause}>
          {trackStatus === 'paused' ? 'Resume' : 'Pause'}
        </button>
        <button className="topbar-btn danger" onClick={handleQuit}>Quit</button>
      </div>

      <div className="app-shell">
        <nav className="sidebar">
          {navItems.map(item => (
            <a key={item.id}
              className={`nav-item${activeSection === item.id ? ' active' : ''}`}
              style={{'--section-color': item.color}}
              onClick={e => { e.preventDefault(); scrollTo(item.id); }}
              href="#">
              <div className="nav-dot" style={{background: item.color}}/>
              <span className="nav-label">{item.label}</span>
            </a>
          ))}
          <div className="sidebar-divider"/>
          <div style={{padding:'8px 12px'}}>
            <div style={{fontSize:'0.72rem', color:'var(--muted)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6}}>Status</div>
            <div style={{fontSize:'0.82rem', color:'var(--text)', fontWeight:500}}>
              {trackStatus === 'tracking' ? '● Tracking active' : trackStatus === 'paused' ? '○ Paused' : '◌ Calibrating'}
            </div>
          </div>
        </nav>

        <main className="main-content" ref={mainRef}>
          <MovementSection    settings={settings}    onChange={handleSettingsChange}/>
          <CalibrationSection/>
          <GesturesSection    settings={settings}    onChange={handleSettingsChange}/>
          <VoiceSection       active={speechActive}  onToggle={toggleSpeech}/>
          <LiveSection/>
        </main>
      </div>

      <div className="footer-bar">
        <span className="save-status" style={{
          color: saveMsg.includes('saved') ? 'oklch(68% 0.20 145)'
               : saveMsg.includes('failed') ? 'oklch(62% 0.22 15)'
               : saveMsg ? 'var(--muted)' : 'transparent',
        }}>
          {saveMsg || '.'}
        </span>
        <button className="footer-btn danger" onClick={handleReset}>Reset to Defaults</button>
        <button className="footer-btn primary" onClick={handleSave}>Save Settings</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
